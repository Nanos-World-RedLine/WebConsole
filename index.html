<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebConsole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================= ECRAN DE CONNEXION ======================= -->
<main id="login-screen" class="screen">
	<form id="login-form" class="login-card">
		<div class="brand">
			<span class="brand-dot" aria-hidden="true"></span>
			<h1>WebConsole</h1>
		</div>
		<p class="login-sub">Connexion réservée à l'équipe d'administration</p>

		<label class="field">
			<span>Email</span>
			<input type="email" id="login-email" required autocomplete="username">
		</label>
		<label class="field">
			<span>Mot de passe</span>
			<input type="password" id="login-password" required autocomplete="current-password">
		</label>

		<button type="submit" class="btn btn-primary">Se connecter</button>
		<p id="login-error" class="error-text" role="alert"></p>
	</form>
</main>

<!-- ============================ TABLEAU DE BORD ============================ -->
<main id="dashboard" class="screen" hidden>

	<header class="topbar">
		<div class="brand">
			<span class="brand-dot" id="conn-dot" aria-hidden="true"></span>
			<h1>WebConsole</h1>
		</div>
		<div class="topbar-right">
			<span id="conn-label" class="conn-label">connexion…</span>
			<span id="user-email" class="user-email"></span>
			<button id="logout-btn" class="btn btn-ghost">Se déconnecter</button>
		</div>
	</header>

	<div class="grid">

		<!-- ---- Console (journal + commande) ---- -->
		<section class="panel console-panel">
			<div class="panel-head"><h2>Console</h2></div>
			<div id="log-panel" class="log-panel" aria-live="polite"></div>
			<form id="console-form" class="console-input-row">
				<span class="console-prompt" aria-hidden="true">&gt;</span>
				<input type="text" id="console-input" placeholder="Tapez une commande, comme sur le terminal du serveur" required autocomplete="off">
				<button type="submit" class="btn btn-primary btn-sm">Envoyer</button>
			</form>
		</section>

		<!-- ---- Processus du serveur (VPS) ---- -->
		<section class="panel">
			<div class="panel-head"><h2>Processus du serveur (VPS)</h2></div>
			<p class="muted panel-note">
				Démarre/arrête/relance réellement le processus sur le VPS,
				y compris s'il est complètement éteint.
			</p>
			<div class="btn-row btn-row-wrap">
				<button type="button" id="server-start-btn" class="btn btn-primary btn-sm">Démarrer</button>
				<button type="button" id="server-stop-btn" class="btn btn-danger btn-sm">Arrêter</button>
				<button type="button" id="server-process-restart-btn" class="btn btn-danger btn-sm">Redémarrer (processus)</button>
			</div>
		</section>

		<!-- ---- Config.toml (traité par vps-agent v3) ---- -->
		<section id="config-tab" class="panel" hidden>
			<div class="panel-head cfg-head">
				<h2>Config.toml <span id="cfg-modified" class="cfg-modified" hidden>&#9679; modifié</span></h2>
				<div class="btn-row btn-row-wrap">
					<select id="cfg-backups" class="cfg-select" title="Backups">
						<option value="">— Backups —</option>
					</select>
					<button type="button" id="cfg-restore" class="btn btn-ghost btn-sm">Restaurer</button>
					<button type="button" id="cfg-reload" class="btn btn-ghost btn-sm">Recharger</button>
					<button type="button" id="cfg-save" class="btn btn-primary btn-sm">Sauvegarder</button>
					<button type="button" id="cfg-save-restart" class="btn btn-danger btn-sm">Sauvegarder + Redémarrer</button>
				</div>
			</div>
			<textarea id="cfg-editor" spellcheck="false" placeholder="# Chargement du Config.toml..."></textarea>
			<p id="cfg-status" class="cfg-status" aria-live="polite"></p>
		</section>

	</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
